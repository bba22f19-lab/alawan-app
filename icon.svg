<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d1b2a"/>
  
  <!-- Subtle inner glow border -->
  <rect x="12" y="12" width="488" height="488" rx="90" fill="none" stroke="#c9963a" stroke-width="3" opacity="0.4"/>
  
  <!-- Road / ground line -->
  <rect x="40" y="370" width="432" height="6" rx="3" fill="#c9963a" opacity="0.3"/>
  
  <!-- TRUCK — detailed & modern -->
  <!-- Trailer body -->
  <rect x="38" y="210" width="258" height="148" rx="10" fill="#1e3a5f"/>
  <rect x="38" y="210" width="258" height="148" rx="10" fill="none" stroke="#c9963a" stroke-width="3"/>
  
  <!-- Trailer ribbing detail -->
  <line x1="110" y1="213" x2="110" y2="355" stroke="#c9963a" stroke-width="1.5" opacity="0.3"/>
  <line x1="182" y1="213" x2="182" y2="355" stroke="#c9963a" stroke-width="1.5" opacity="0.3"/>
  <line x1="254" y1="213" x2="254" y2="355" stroke="#c9963a" stroke-width="1.5" opacity="0.3"/>
  
  <!-- AL AWAN text on trailer -->
  <text x="167" y="296" font-family="Georgia,serif" font-size="30" font-weight="900" fill="#c9963a" text-anchor="middle" letter-spacing="2">AL AWAN</text>
  <text x="167" y="325" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">ENTERPRISES</text>
  
  <!-- Cab connector -->
  <rect x="290" y="268" width="18" height="90" rx="4" fill="#2a4a6a"/>
  
  <!-- Cab body -->
  <rect x="300" y="240" width="168" height="118" rx="12" fill="#1e3a5f"/>
  <rect x="300" y="240" width="168" height="118" rx="12" fill="none" stroke="#c9963a" stroke-width="2.5"/>
  
  <!-- Cab roof sleeper bump -->
  <rect x="310" y="220" width="100" height="30" rx="8" fill="#1a3352"/>
  <rect x="310" y="220" width="100" height="30" rx="8" fill="none" stroke="#c9963a" stroke-width="2" opacity="0.6"/>
  
  <!-- Windshield -->
  <rect x="370" y="252" width="82" height="68" rx="8" fill="#0d2a4a"/>
  <rect x="370" y="252" width="82" height="68" rx="8" fill="none" stroke="#c9963a" stroke-width="2"/>
  <!-- Windshield reflection -->
  <line x1="378" y1="258" x2="390" y2="312" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Side window -->
  <rect x="310" y="256" width="52" height="44" rx="6" fill="#0d2a4a"/>
  <rect x="310" y="256" width="52" height="44" rx="6" fill="none" stroke="#c9963a" stroke-width="1.5"/>
  
  <!-- Headlights -->
  <rect x="454" y="264" width="20" height="12" rx="3" fill="#fff9c4"/>
  <rect x="454" y="264" width="20" height="12" rx="3" fill="none" stroke="#c9963a" stroke-width="1"/>
  <!-- Headlight glow -->
  <ellipse cx="474" cy="270" rx="16" ry="8" fill="#fffde7" opacity="0.3"/>
  
  <rect x="454" y="300" width="20" height="8" rx="2" fill="#ffcc44" opacity="0.8"/>
  
  <!-- Front bumper -->
  <rect x="448" y="316" width="28" height="14" rx="4" fill="#2a4a6a"/>
  <rect x="448" y="316" width="28" height="14" rx="4" fill="none" stroke="#c9963a" stroke-width="1.5"/>
  
  <!-- Exhaust pipes -->
  <rect x="294" y="215" width="10" height="40" rx="5" fill="#2a4a6a" stroke="#c9963a" stroke-width="1.5"/>
  <rect x="308" y="218" width="10" height="37" rx="5" fill="#2a4a6a" stroke="#c9963a" stroke-width="1.5"/>
  <!-- Exhaust smoke -->
  <ellipse cx="299" cy="212" rx="5" ry="3" fill="rgba(255,255,255,0.15)"/>
  <ellipse cx="299" cy="206" rx="4" ry="3" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="313" cy="215" rx="5" ry="3" fill="rgba(255,255,255,0.12)"/>
  
  <!-- WHEELS -->
  <!-- Trailer rear wheels (double) -->
  <circle cx="88" cy="370" r="34" fill="#111e2d" stroke="#c9963a" stroke-width="3"/>
  <circle cx="88" cy="370" r="22" fill="#1a2e42" stroke="#c9963a" stroke-width="2"/>
  <circle cx="88" cy="370" r="8" fill="#c9963a"/>
  <!-- Wheel bolts -->
  <circle cx="88" cy="349" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="88" cy="391" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="67" cy="370" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="109" cy="370" r="3" fill="#c9963a" opacity="0.7"/>

  <circle cx="148" cy="370" r="34" fill="#111e2d" stroke="#c9963a" stroke-width="3"/>
  <circle cx="148" cy="370" r="22" fill="#1a2e42" stroke="#c9963a" stroke-width="2"/>
  <circle cx="148" cy="370" r="8" fill="#c9963a"/>
  <circle cx="148" cy="349" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="148" cy="391" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="127" cy="370" r="3" fill="#c9963a" opacity="0.7"/>
  <circle cx="169" cy="370" r="3" fill="#c9963a" opacity="0.7"/>

  <!-- Trailer front wheel -->
  <circle cx="248" cy="370" r="32" fill="#111e2d" stroke="#c9963a" stroke-width="3"/>
  <circle cx="248" cy="370" r="20" fill="#1a2e42" stroke="#c9963a" stroke-width="2"/>
  <circle cx="248" cy="370" r="7" fill="#c9963a"/>
  
  <!-- Cab wheels -->
  <circle cx="370" cy="370" r="36" fill="#111e2d" stroke="#c9963a" stroke-width="3"/>
  <circle cx="370" cy="370" r="24" fill="#1a2e42" stroke="#c9963a" stroke-width="2"/>
  <circle cx="370" cy="370" r="9" fill="#c9963a"/>
  <circle cx="370" cy="346" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="370" cy="394" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="346" cy="370" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="394" cy="370" r="3.5" fill="#c9963a" opacity="0.7"/>

  <circle cx="456" cy="370" r="36" fill="#111e2d" stroke="#c9963a" stroke-width="3"/>
  <circle cx="456" cy="370" r="24" fill="#1a2e42" stroke="#c9963a" stroke-width="2"/>
  <circle cx="456" cy="370" r="9" fill="#c9963a"/>
  <circle cx="456" cy="346" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="456" cy="394" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="432" cy="370" r="3.5" fill="#c9963a" opacity="0.7"/>
  <circle cx="480" cy="370" r="3.5" fill="#c9963a" opacity="0.7"/>
  
  <!-- Gold accent stripe on trailer bottom -->
  <rect x="38" y="348" width="258" height="6" rx="2" fill="#c9963a" opacity="0.5"/>
  
  <!-- Stars / dots decoration top -->
  <circle cx="60" cy="60" r="2" fill="#c9963a" opacity="0.4"/>
  <circle cx="90" cy="40" r="1.5" fill="#c9963a" opacity="0.3"/>
  <circle cx="440" cy="55" r="2" fill="#c9963a" opacity="0.4"/>
  <circle cx="470" cy="75" r="1.5" fill="#c9963a" opacity="0.3"/>
  <circle cx="460" cy="40" r="1" fill="#c9963a" opacity="0.25"/>
</svg>
